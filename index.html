<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter city name" spellcheck="false">
            <button><img src="img/search.svg"></button>
        </div>
        <div class="error">
            <p>Invalid City name</p>
        </div>
        <div class="Weather">
            <img src="img/rain.png" class="weather-icon">
            <h1 class="temp">21°c</h1>
            <h2 class="city">Nairobi</h2>
            <div class="details">
                <div class="col">
                    <img src="img/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="img/wind.png">
                    <div>
                        <p class="wind">15 Km/h</p>
                        <p>Wind speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="local/config.js"></script>
    <script>
        const apiurl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        if (typeof apiKey === "undefined" || !apiKey || apiKey === "YOUR_API_KEY_HERE") {
            console.warn("No API key set. Copy config.example.js to local/config.js and set apiKey.");
        }

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector(".search button");
        const weatherIcon = document.querySelector(".weather-icon");

        async function checkfunction(city) {
            if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
                alert("Please set your OpenWeatherMap API key in local/config.js.");
                return;
            }

            const response = await fetch(apiurl + city + `&appid=${apiKey}`);
            const data = await response.json();

            // Handle API errors (invalid key, rate limit, city not found, etc.)
            if (!response.ok) {
                console.warn("Weather API error", response.status, data);
                document.querySelector(".error").style.display = "block";
                document.querySelector(".Weather").style.display = "none";
                return;
            }

            document.querySelector(".city").innerHTML = data.name;
            document.querySelector(".temp").innerHTML = data.main.temp + "°c";
            document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
            document.querySelector(".wind").innerHTML = data.wind.speed + "Km/h";

            if(data.weather[0].main == "Clouds"){
                weatherIcon.src = "img/clouds.png";
            }
            else if(data.weather[0].main == "Clear"){
                weatherIcon.src = "img/clear.png";
            }
            else if(data.weather[0].main == "Rain"){
                weatherIcon.src = "img/rain.png";
            }
            else if(data.weather[0].main == "Drizzle"){
                weatherIcon.src = "img/drizzle.png";
            }
            else if(data.weather[0].main == "Mist"){
                weatherIcon.src = "img/mist.png";
            }

            document.querySelector(".Weather").style.display = "block";
            document.querySelector(".error").style.display = "none";
        }
            
           
        

        searchBtn.addEventListener("click", ()=>{
            checkfunction(searchBox.value);
        })
        
    </script>
</body>
</html>
